name: validate-test-design-framework

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python scripts/validate-test-design.py
      - run: python scripts/sync-rule-entrypoints.py
      - run: python -m unittest discover -s tests -v
      - if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/validate-test-design.ps1
      - if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/new-framework-upgrade-package.ps1 -OutputDir dist-test
